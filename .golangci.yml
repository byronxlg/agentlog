version: "2"

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gocritic
    - revive
    - misspell
  settings:
    revive:
      rules:
        - name: exported
        - name: var-naming
        - name: blank-imports
        - name: context-as-argument
        - name: error-return
        - name: error-strings
        - name: increment-decrement
    gocritic:
      enabled-tags:
        - diagnostic
        - style

formatters:
  enable:
    - gofmt

output:
  max-issues-per-linter: 0
  max-same-issues: 0
