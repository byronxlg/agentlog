site_name: agentlog
site_description: A local-first decision log daemon for agentic workflows
site_url: https://byronxlg.github.io/agentlog/
repo_url: https://github.com/byronxlg/agentlog
repo_name: byronxlg/agentlog

theme:
  name: material
  features:
    - content.code.copy
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
  palette:
    scheme: default

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - CLI Reference: cli-reference.md
  - Python SDK: python-sdk.md
  - TypeScript SDK: typescript-sdk.md
  - Claude Code Integration: claude-code.md
  - Architecture: architecture.md

markdown_extensions:
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
