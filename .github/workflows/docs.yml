name: Deploy docs

on:
  push:
    branches: [main]
    paths:
      - 'docs-site/**'
      - 'landing/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install mkdocs-material
        run: pip install mkdocs-material

      - name: Build docs
        run: mkdocs build --strict --config-file docs-site/mkdocs.yml

      - name: Assemble site
        run: |
          mkdir -p _site/docs
          cp landing/index.html landing/style.css _site/
          cp -r docs-site/site/* _site/docs/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
