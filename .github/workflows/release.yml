name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binaries
        env:
          CGO_ENABLED: '0'
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          go build -o "dist/agentlog-${{ matrix.goos }}-${{ matrix.goarch }}" ./cmd/agentlog
          go build -o "dist/agentlogd-${{ matrix.goos }}-${{ matrix.goarch }}" ./cmd/agentlogd

      - name: Create archive
        run: |
          VERSION="${GITHUB_REF_NAME}"
          ARCHIVE="agentlog-${VERSION}-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz"
          tar -czf "${ARCHIVE}" -C dist \
            "agentlog-${{ matrix.goos }}-${{ matrix.goarch }}" \
            "agentlogd-${{ matrix.goos }}-${{ matrix.goarch }}"

      - name: Upload archive
        uses: actions/upload-artifact@v4
        with:
          name: agentlog-${{ matrix.goos }}-${{ matrix.goarch }}
          path: agentlog-*.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum agentlog-*.tar.gz > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/agentlog-*.tar.gz
            artifacts/checksums.txt
