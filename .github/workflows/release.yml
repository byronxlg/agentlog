name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binaries
        env:
          CGO_ENABLED: '0'
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          go build -o "dist/agentlog-${{ matrix.goos }}-${{ matrix.goarch }}" ./cmd/agentlog
          go build -o "dist/agentlogd-${{ matrix.goos }}-${{ matrix.goarch }}" ./cmd/agentlogd

      - name: Create archive
        run: |
          VERSION="${GITHUB_REF_NAME}"
          ARCHIVE="agentlog-${VERSION}-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz"
          tar -czf "${ARCHIVE}" -C dist \
            "agentlog-${{ matrix.goos }}-${{ matrix.goarch }}" \
            "agentlogd-${{ matrix.goos }}-${{ matrix.goarch }}"

      - name: Upload archive
        uses: actions/upload-artifact@v4
        with:
          name: agentlog-${{ matrix.goos }}-${{ matrix.goarch }}
          path: agentlog-*.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum agentlog-*.tar.gz > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/agentlog-*.tar.gz
            artifacts/checksums.txt

  update-homebrew:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Download checksums from release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME}"
          gh release download "$VERSION" --repo byronxlg/agentlog --pattern checksums.txt
          cat checksums.txt

      - name: Generate formula
        run: |
          VERSION="${GITHUB_REF_NAME}"
          VERSION_NUM="${VERSION#v}"
          SHA_DARWIN_ARM64=$(grep "darwin-arm64" checksums.txt | awk '{print $1}')
          SHA_DARWIN_AMD64=$(grep "darwin-amd64" checksums.txt | awk '{print $1}')
          SHA_LINUX_AMD64=$(grep "linux-amd64" checksums.txt | awk '{print $1}')
          SHA_LINUX_ARM64=$(grep "linux-arm64" checksums.txt | awk '{print $1}')
          cat > agentlog.rb << FORMULA
          class Agentlog < Formula
            desc "Local-first decision log daemon for agentic workflows"
            homepage "https://github.com/byronxlg/agentlog"
            version "${VERSION_NUM}"

            on_macos do
              on_arm do
                url "https://github.com/byronxlg/agentlog/releases/download/v#{version}/agentlog-v#{version}-darwin-arm64.tar.gz"
                sha256 "${SHA_DARWIN_ARM64}"
              end
              on_intel do
                url "https://github.com/byronxlg/agentlog/releases/download/v#{version}/agentlog-v#{version}-darwin-amd64.tar.gz"
                sha256 "${SHA_DARWIN_AMD64}"
              end
            end

            on_linux do
              on_arm do
                url "https://github.com/byronxlg/agentlog/releases/download/v#{version}/agentlog-v#{version}-linux-arm64.tar.gz"
                sha256 "${SHA_LINUX_ARM64}"
              end
              on_intel do
                url "https://github.com/byronxlg/agentlog/releases/download/v#{version}/agentlog-v#{version}-linux-amd64.tar.gz"
                sha256 "${SHA_LINUX_AMD64}"
              end
            end

            def install
              os = OS.mac? ? "darwin" : "linux"
              arch = Hardware::CPU.arm? ? "arm64" : "amd64"
              bin.install "agentlog-#{os}-#{arch}" => "agentlog"
              bin.install "agentlogd-#{os}-#{arch}" => "agentlogd"
            end

            test do
              assert_match "agentlog", shell_output("#{bin}/agentlog 2>&1", 1)
            end
          end
          FORMULA
          cat agentlog.rb

      - name: Push to tap
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/byronxlg/homebrew-agentlog.git" tap
          cp agentlog.rb tap/Formula/agentlog.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/agentlog.rb
          git diff --cached --quiet && echo "No changes to formula" || (git commit -m "Update agentlog to ${GITHUB_REF_NAME}" && git push)
