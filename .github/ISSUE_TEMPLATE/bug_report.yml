name: Bug Report
description: Report a bug in agentlog
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Run '...'
        2. Configure '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: false

  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual behavior
      description: What actually happened. Include error messages or log output if available.
    validations:
      required: false

  - type: input
    id: os
    attributes:
      label: Operating system
      description: e.g., macOS 14.5, Ubuntu 22.04, Windows 11
      placeholder: macOS 14.5
    validations:
      required: false

  - type: input
    id: agentlog-version
    attributes:
      label: agentlog version
      description: Output of `agentlog --version` or the version you installed.
      placeholder: v0.2.0
    validations:
      required: false

  - type: dropdown
    id: install-method
    attributes:
      label: Install method
      description: How did you install agentlog?
      options:
        - Install script (curl | sh)
        - GitHub release binary
        - Built from source
        - Other
    validations:
      required: false
